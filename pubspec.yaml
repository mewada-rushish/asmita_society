name: asmita_society
description: "AsmitA - Secure Smart Home IoT & Society Operations Platform."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.12.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_bloc: ^8.1.3
  equatable: ^2.0.5
  get_it: ^7.6.0
  dio: ^5.4.0
  web_socket_channel: ^3.0.1
  firebase_core: ^3.15.2
  firebase_messaging: ^15.0.0
  flutter_secure_storage: ^9.0.0
  local_auth: ^2.1.8
  safe_device: ^1.3.10
  pointycastle: ^3.9.1
  google_fonts: ^6.1.0
  flutter_svg: ^2.0.10
  flutter_native_splash: ^2.4.7
  firebase_crashlytics: ^4.3.10

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  bloc_test: ^9.1.5
  flutter_launcher_icons: ^0.13.1
flutter:
  uses-material-design: true

  assets:
    - assets/icons/
    - assets/images/

  fonts:
    - family: Montserrat
      fonts:
        - asset: assets/fonts/Montserrat/Montserrat-Bold.ttf
          weight: 700
        - asset: assets/fonts/Montserrat/Montserrat-SemiBold.ttf
          weight: 600
    - family: Poppins
      fonts:
        - asset: assets/fonts/Poppins/Poppins-Regular.ttf
          weight: 400
        - asset: assets/fonts/Poppins/Poppins-Medium.ttf
          weight: 500

flutter_native_splash:
  color: "#F8F8FB"
  image: assets/images/native_splash.png
  android_12:
    color: "#F8F8FB"
    image: assets/images/native_splash.png
  android: true
  ios: true

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/app_icon.png"